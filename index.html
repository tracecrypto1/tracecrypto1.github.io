<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nick Matthew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
      :root {
        --custom-orange: #95abab; /* Standard logo teal */
        --custom-red: #5a6e6e;    /* deeper teal */
        font-family: "Georgia", serif;
      }

      body {
        background-color: #0a0c0d; /* Standard logo near-black */
        color: #d4d8d9;            /* off-white body text */
      }

      /* Convert every image to black and white */
      img {
        filter: grayscale(100%);
      }
    </style>
  </head>
  <body>
    <div class="flex flex-col min-h-screen">
      <!-- Main Content -->
      <div class="p-[25px] w-full md:w-1/2 min-w-min">
        <!-- Headshot -->
        <div class="w-48 mb-6">
          <img src="/headshot.jpeg" alt="Nick Matthew" class="w-48 rounded-lg shadow-md" />
          <p class="text-sm mt-3">
            I invest at <a href="https://www.standardcrypto.vc/" target="_blank" class="text-[--custom-orange] hover:underline">Standard</a>.
          </p>
          <p class="text-sm mt-3">
            Above all else, I am interested in how the entire world works.
          </p>
          <p class="text-sm mt-3">
            To that end, I spend a lot of time learning new things.
          </p>
          <p class="text-sm mt-3">
            Here's my <a href="https://www.goodreads.com/user/show/37911190-nick" target="_blank" class="text-[--custom-orange] hover:underline">bookshelf</a> and <a href="https://curius.app/information-flow" target="_blank" class="text-[--custom-orange] hover:underline">curius</a> for a glimpse.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
